kind = "web"
previewPath = "/"
title = "ArveX Hosting™"
version = "1.0.0"
id = "artifacts/arvex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23182

[services.development]
run = "pnpm --filter @workspace/arvex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arvex", "run", "build" ]
publicDir = "artifacts/arvex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23182"
BASE_PATH = "/"
